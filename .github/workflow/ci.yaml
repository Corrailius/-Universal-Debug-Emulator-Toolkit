name: CI
  on:
    push:
      branches:
        - ['**']
      pull requests:
        branches: ['**']
    jobs:
      build:
        runs-on: windows-latest
        steps:
          - uses: actions/checkout@v2
          - name: Setup .NET
            uses: actions/setup-dotnet@v1
            with:
              dotnet-version: 10.0.x
          - name: Restore dependencies
            run: dotnet restore
      